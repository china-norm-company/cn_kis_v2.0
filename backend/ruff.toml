# CN KIS V2.0 Backend Ruff 配置
# 与 CI 命令保持一致：--select E,W,F --ignore E501
# 以下规则是历史存量问题，逐步修复中，暂时排除以维持 CI 通过

[lint]
select = ["E", "W", "F"]
ignore = [
    "E501",   # line too long (由 CI 命令排除)
    "E402",   # module import not at top of file（Django 路由模式下无法避免）
    "F841",   # local variable assigned but never used（存量代码，逐步清理）
    "E741",   # ambiguous variable name（存量代码，l/O/I 等命名）
    "F601",   # multi-value repeated key literal（存量代码）
    "E701",   # multiple statements on one line（存量代码）
    "F821",   # undefined name（Django 动态属性，如 __all__ 等场景）
    "E731",   # lambda assignment（存量代码）
    "E702",   # multiple statements on one line - semicolon（存量代码）
    "E712",   # comparison to True/False（存量代码）
    "F811",   # redefined while unused（部分为条件导入模式）
]

exclude = [
    "*/migrations/*",
    "*/venv/*",
    "*/__pycache__/*",
]
