# 试用实例（资生堂审计 / 邮件信号全链路）- 端口 8082，与生产 80 完全隔离
server {
    listen 8082;
    server_name 118.196.64.48 localhost;
    charset utf-8;
    access_log /var/log/nginx/cn-kis-audit-access.log;
    error_log /var/log/nginx/cn-kis-audit-error.log;

    # API 反向代理到试用实例 gunicorn (8004)
    location /api {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # 各工作台静态（与生产结构一致，路径为 cn-kis-audit）
    location /research {
        alias /var/www/cn-kis-audit/research;
        try_files $uri $uri/ /research/index.html;
        index index.html;
    }
    location /quality {
        alias /var/www/cn-kis-audit/quality;
        try_files $uri $uri/ /quality/index.html;
        index index.html;
    }
    location /finance {
        alias /var/www/cn-kis-audit/finance;
        try_files $uri $uri/ /finance/index.html;
        index index.html;
    }
    location /hr {
        alias /var/www/cn-kis-audit/hr;
        try_files $uri $uri/ /hr/index.html;
        index index.html;
    }
    location /crm {
        alias /var/www/cn-kis-audit/crm;
        try_files $uri $uri/ /crm/index.html;
        index index.html;
    }
    location /execution {
        alias /var/www/cn-kis-audit/execution;
        try_files $uri $uri/ /execution/index.html;
        index index.html;
    }
    location /recruitment {
        alias /var/www/cn-kis-audit/recruitment;
        try_files $uri $uri/ /recruitment/index.html;
        index index.html;
    }
    location /equipment {
        alias /var/www/cn-kis-audit/equipment;
        try_files $uri $uri/ /equipment/index.html;
        index index.html;
    }
    location /material {
        alias /var/www/cn-kis-audit/material;
        try_files $uri $uri/ /material/index.html;
        index index.html;
    }
    location /facility {
        alias /var/www/cn-kis-audit/facility;
        try_files $uri $uri/ /facility/index.html;
        index index.html;
    }
    location /lab-personnel {
        alias /var/www/cn-kis-audit/lab-personnel;
        try_files $uri $uri/ /lab-personnel/index.html;
        index index.html;
    }
    location /evaluator {
        alias /var/www/cn-kis-audit/evaluator;
        try_files $uri $uri/ /evaluator/index.html;
        index index.html;
    }
    location /ethics {
        alias /var/www/cn-kis-audit/ethics;
        try_files $uri $uri/ /ethics/index.html;
        index index.html;
    }
    location /reception {
        alias /var/www/cn-kis-audit/reception;
        try_files $uri $uri/ /reception/index.html;
        index index.html;
    }
    location /control-plane {
        alias /var/www/cn-kis-audit/control-plane;
        try_files $uri $uri/ /control-plane/index.html;
        index index.html;
    }
    location /admin {
        alias /var/www/cn-kis-audit/admin;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }
    location /digital-workforce {
        alias /var/www/cn-kis-audit/digital-workforce;
        try_files $uri $uri/ /digital-workforce/index.html;
        index index.html;
    }
    location /secretary {
        alias /var/www/cn-kis-audit/secretary;
        try_files $uri $uri/ /secretary/index.html;
        index index.html;
    }

    location ~* ^/(secretary|research|quality|finance|hr|crm|execution|recruitment|equipment|material|facility|evaluator|lab-personnel|ethics|reception|control-plane|admin|digital-workforce)/assets/ {
        root /var/www/cn-kis-audit;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /login {
        root /var/www/cn-kis-audit/secretary;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
    location = / {
        return 301 /secretary/;
    }
    location / {
        root /var/www/cn-kis-audit/secretary;
        try_files $uri $uri/ /secretary/index.html;
        index index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-CN-KIS-Instance "audit" always;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
