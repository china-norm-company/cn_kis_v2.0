# 小程序域名 mini.utest.cc 的 HTTPS（443）配置
# 用于微信小程序 request 域名，必须 HTTPS。
# 证书路径：Let's Encrypt 默认 /etc/letsencrypt/live/mini.utest.cc/
# 若尚未申请证书，不要启用此配置（nginx -t 会失败）。
server {
    listen 443 ssl;
    server_name mini.utest.cc;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/mini.utest.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mini.utest.cc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    access_log /var/log/nginx/mini-utest-access.log;
    error_log  /var/log/nginx/mini-utest-error.log;

    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    location / {
        return 404;
    }

    add_header X-Content-Type-Options "nosniff" always;
}
