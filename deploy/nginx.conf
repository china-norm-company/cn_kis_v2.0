# ============================================================
# CN-KIS 工作台 — HTTP (80) + HTTPS (443)
# server_name 包含 IP 118.196.64.48，设为 default_server
# location 配置见下方内联
# ============================================================

# ---------- HTTP ----------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost 118.196.64.48;
    charset utf-8;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        alias /var/www/letsencrypt/;
    }

    # 方案质量检查台（研究台 iframe 内嵌，Flask 服务端口 5000）
    location /protocol-qc/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 180s;
        client_max_body_size 50M;
    }

    # API 反向代理（含实验室排程等上传接口，需放宽请求体限制）
    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # 各工作台
    location /research {
        alias /var/www/cn-kis/research;
        try_files $uri $uri/ /research/index.html;
        index index.html;
    }

    location /quality {
        alias /var/www/cn-kis/quality;
        try_files $uri $uri/ /quality/index.html;
        index index.html;
    }

    location /finance {
        alias /var/www/cn-kis/finance;
        try_files $uri $uri/ /finance/index.html;
        index index.html;
    }

    location /hr {
        alias /var/www/cn-kis/hr;
        try_files $uri $uri/ /hr/index.html;
        index index.html;
    }

    location /crm {
        alias /var/www/cn-kis/crm;
        try_files $uri $uri/ /crm/index.html;
        index index.html;
    }

    location /execution {
        alias /var/www/cn-kis/execution;
        try_files $uri $uri/ /execution/index.html;
        index index.html;
    }

    location /recruitment {
        alias /var/www/cn-kis/recruitment;
        try_files $uri $uri/ /recruitment/index.html;
        index index.html;
    }

    # 设备管理台
    location /equipment {
        alias /var/www/cn-kis/equipment;
        try_files $uri $uri/ /equipment/index.html;
        index index.html;
    }

    # 物料管理台
    location /material {
        alias /var/www/cn-kis/material;
        try_files $uri $uri/ /material/index.html;
        index index.html;
    }

    # 设施环境台
    location /facility {
        alias /var/www/cn-kis/facility;
        try_files $uri $uri/ /facility/index.html;
        index index.html;
    }

    # 人员台（共济）— 实验室人员管理
    location /lab-personnel {
        alias /var/www/cn-kis/lab-personnel;
        try_files $uri $uri/ /lab-personnel/index.html;
        index index.html;
    }

    # 技术评估台
    location /evaluator {
        alias /var/www/cn-kis/evaluator;
        try_files $uri $uri/ /evaluator/index.html;
        index index.html;
    }

    # 伦理台（御史）
    location /ethics {
        alias /var/www/cn-kis/ethics;
        try_files $uri $uri/ /ethics/index.html;
        index index.html;
    }

    # 接待台（和序）
    location /reception {
        alias /var/www/cn-kis/reception;
        try_files $uri $uri/ /reception/index.html;
        index index.html;
    }

    # 统一平台（天工）
    location /control-plane {
        alias /var/www/cn-kis/control-plane;
        try_files $uri $uri/ /control-plane/index.html;
        index index.html;
    }

    # 管理后台（鹿鸣·治理台）
    location /admin {
        alias /var/www/cn-kis/admin;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # 中书·智能台
    location /digital-workforce {
        alias /var/www/cn-kis/digital-workforce;
        try_files $uri $uri/ /digital-workforce/index.html;
        index index.html;
    }

    # 静态资源长缓存
    location ~* ^/(secretary|research|quality|finance|hr|crm|execution|recruitment|equipment|material|facility|evaluator|lab-personnel|ethics|reception|control-plane|admin|digital-workforce)/assets/ {
        root /var/www/cn-kis;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 入口 HTML 禁止缓存（飞书容器缓存旧入口会导致白屏/老代码）
    location = /login {
        root /var/www/cn-kis/secretary;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires -1;
    }

    location ~* ^/(secretary|research|quality|finance|hr|crm|execution|recruitment|equipment|material|facility|evaluator|lab-personnel|ethics|reception|control-plane|admin|digital-workforce|perf-master)/index\.html$ {
        root /var/www/cn-kis;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        expires -1;
    }

    # 秘书台（默认工作台）
    location /secretary {
        alias /var/www/cn-kis/secretary;
        try_files $uri $uri/ /secretary/index.html;
        index index.html;
    }

    # Master 绩效台（研究台「绩效结算」页 iframe 内嵌，路径 /perf-master）
    location /perf-master {
        alias /var/www/cn-kis/perf-master;
        try_files $uri $uri/ /perf-master/index.html;
        index index.html;
    }

    # 根路径重定向到秘书台
    location = / {
        return 301 /secretary/;
    }

    location / {
        root /var/www/cn-kis/secretary;
        try_files $uri $uri/ /secretary/index.html;
        index index.html;
    }

    # 安全头（不设置 X-Frame-Options，飞书 H5 应用需要在 webview 中加载）
    add_header X-Content-Type-Options "nosniff" always;

    # 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               font/truetype font/opentype image/svg+xml;
}
