# mini.china-norm.com HTTPS（443）配置
# 用途：微信小程序 HTTPS 直连备用通道（主通道为 callContainer 内网）
# 部署位置：腾讯云 118.25.182.215 或火山云 118.196.64.48
# 证书：Let's Encrypt 自动续期
server {
    listen 443 ssl;
    server_name mini.china-norm.com;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/mini.china-norm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mini.china-norm.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/china-norm-mini-access.log;
    error_log  /var/log/nginx/china-norm-mini-error.log;

    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    location / {
        return 404;
    }

    add_header X-Content-Type-Options "nosniff" always;
}
