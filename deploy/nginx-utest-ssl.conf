# 小程序 API 域名 www.utest.cc / utest.cc 的 HTTPS（443）配置
# 证书覆盖：utest.cc + www.utest.cc（付费测试证书）
# 重要：fullchain.pem 必须为「站点证书 + 中间证书(+ 根证书)」顺序拼接，缺中间证书会导致手机/微信 TLS 握手失败
# 证书路径：/etc/nginx/ssl/utest.cc/
server {
    listen 443 ssl;
    server_name utest.cc www.utest.cc;
    charset utf-8;

    ssl_certificate     /etc/nginx/ssl/utest.cc/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/utest.cc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/utest-ssl-access.log;
    error_log  /var/log/nginx/utest-ssl-error.log;

    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # 首页动画资源（小程序远程视频）
    location = /utest.mp4 {
        alias /var/www/cn-kis/media/utest.mp4;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    location / {
        return 404;
    }

    add_header X-Content-Type-Options "nosniff" always;
}
