# CN KIS V2.0 - 阿里云测试环境后端部署
# 触发：develop 分支 backend/ 改动推送，或手动 workflow_dispatch
# 所需 GitHub Secrets：
#   ALIYUN_SSH_KEY      → 从 V1 仓库复制（china-norm-company/cn_kis_v1.0 → Settings → Secrets）
#   BACKEND_DOT_ENV     → V2 测试环境 .env 内容（见 backend/.env.test.example 填写后粘贴）
#   ALIYUN_HOST         → test-guide.data-infact.com（已设置）
#   ALIYUN_USER         → wuxianyu（已设置）
#   ALIYUN_DEPLOY_PATH  → /home/wuxianyu/cn_kis_v2（已设置）

name: Deploy V2 Backend to Aliyun Test

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: 'manual deploy'

env:
  REPO_DIR: ${{ secrets.ALIYUN_DEPLOY_PATH }}
  ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
  ALIYUN_USER: ${{ secrets.ALIYUN_USER }}

concurrency:
  group: deploy-v2-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🔍 Check required secrets
        run: |
          echo "📋 Checking required GitHub Secrets..."
          MISSING=""
          [ -z "${{ secrets.ALIYUN_SSH_KEY }}" ] && MISSING="${MISSING} ALIYUN_SSH_KEY"
          [ -z "${{ secrets.BACKEND_DOT_ENV }}" ] && MISSING="${MISSING} BACKEND_DOT_ENV"
          [ -z "${{ secrets.ALIYUN_HOST }}" ] && MISSING="${MISSING} ALIYUN_HOST"
          [ -z "${{ secrets.ALIYUN_USER }}" ] && MISSING="${MISSING} ALIYUN_USER"
          [ -z "${{ secrets.ALIYUN_DEPLOY_PATH }}" ] && MISSING="${MISSING} ALIYUN_DEPLOY_PATH"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            echo "   Setup guide: docs/ENV_CUTOVER_PLAN.md → GitHub Secrets 配置"
            exit 1
          fi
          echo "✅ All secrets present"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Deploy to: ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:${{ secrets.ALIYUN_DEPLOY_PATH }}"

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ALIYUN_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "🔑 Key fingerprint: $(ssh-keygen -lf ~/.ssh/deploy_key 2>/dev/null || echo 'check failed')"

      - name: 🧪 Test SSH connection
        run: |
          ssh -o ConnectTimeout=10 -i ~/.ssh/deploy_key \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} \
            "echo '✅ SSH OK'; hostname; whoami; df -h / | tail -1"

      - name: 📁 Ensure remote directory structure
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} \
            "mkdir -p ${{ secrets.ALIYUN_DEPLOY_PATH }}/backend && echo '✅ Remote dirs ready'"

      - name: 📤 Upload .env from secret
        run: |
          echo "${{ secrets.BACKEND_DOT_ENV }}" > backend/.env
          echo "📏 .env size: $(wc -c < backend/.env) bytes"
          # 安全验证：确保测试环境隔离开关已设置
          if ! grep -q "CELERY_PRODUCTION_TASKS_DISABLED=true" backend/.env; then
            echo "❌ CELERY_PRODUCTION_TASKS_DISABLED=true is missing from BACKEND_DOT_ENV!"
            echo "   This is required by V2 Migration Charter Redline 4."
            exit 1
          fi
          echo "✅ Safety check: CELERY_PRODUCTION_TASKS_DISABLED=true confirmed"
          rsync -avz --no-perms --no-owner --no-group \
            -e "ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            backend/.env \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:${{ secrets.ALIYUN_DEPLOY_PATH }}/backend/.env
          echo "✅ .env uploaded"

      - name: 📤 Sync code to server (rsync)
        run: |
          echo "🔄 Syncing backend code to server..."
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='db.sqlite3' \
            --exclude='media/' \
            --exclude='staticfiles/' \
            -e "ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            backend/ \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:${{ secrets.ALIYUN_DEPLOY_PATH }}/backend/
          echo "✅ Backend code synced"
          # 同步部署脚本
          rsync -avz \
            -e "ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            build_backend_image_only_under_root_path.sh \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:${{ secrets.ALIYUN_DEPLOY_PATH }}/

      - name: 🚀 Build & deploy Docker container
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} \
            "cd ${{ secrets.ALIYUN_DEPLOY_PATH }} && \
             chmod +x build_backend_image_only_under_root_path.sh && \
             bash build_backend_image_only_under_root_path.sh"

      - name: ✅ Verify deployment
        run: |
          echo "🔍 Verifying deployment on port 9001..."
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} <<'VERIFY_EOF'
            # 检查容器
            echo "🐳 Containers on port 9001:"
            docker ps --filter "publish=9001" --format "table {{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Names}}"

            CONTAINER_COUNT=$(docker ps --filter "publish=9001" --format "{{.ID}}" | wc -l)
            if [ "$CONTAINER_COUNT" -gt 0 ]; then
              echo "✅ Container running on port 9001"
            else
              echo "❌ No container on port 9001"
              exit 1
            fi

            # 健康检查
            sleep 3
            if curl -sf http://localhost:9001/api/v1/health > /dev/null; then
              echo "✅ Health check passed: /api/v1/health"
            else
              echo "⚠️  Health check failed, checking logs..."
              docker logs $(docker ps -q --filter "publish=9001") --tail 30
              exit 1
            fi
          VERIFY_EOF

      - name: 📝 Deployment summary
        if: success()
        run: |
          echo "## ✅ V2 Backend Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 环境 | 阿里云测试（AliyunTest）|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | \`${{ secrets.ALIYUN_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 部署路径 | \`${{ secrets.ALIYUN_DEPLOY_PATH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发方式 | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "健康检查：http://test-guide.data-infact.com:9001/api/v1/health" >> $GITHUB_STEP_SUMMARY
