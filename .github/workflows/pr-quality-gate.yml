name: PR Quality Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-pr-template:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR description and checklist
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const failures = [];
            const warnings = [];

            const filesResp = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changedFiles = filesResp.data.map(f => f.filename);

            // ── 风险等级分类（Tier-0 / Tier-1 / Tier-2）────────────────────────────
            const isTier0 = changedFiles.some((f) =>
              f.startsWith('backend/apps/identity/') ||
              f.startsWith('backend/libs/') ||
              f === 'backend/urls.py' ||
              f === 'backend/config/settings.py' ||
              f === 'backend/apps/knowledge/ingestion_pipeline.py' ||
              f.startsWith('.github/workflows/') ||
              f.startsWith('ops/')
            );

            const isTier1 = !isTier0 && changedFiles.some((f) =>
              f === 'backend/configs/workstations.yaml' ||
              f.startsWith('backend/apps/notification/') ||
              f.startsWith('backend/apps/feishu_sync/') ||
              f.startsWith('backend/apps/agent_gateway/') ||
              f.startsWith('backend/apps/claw/') ||
              f === 'docs/V2_MIGRATION_CHARTER.md'
            );

            // Tier-2：仅触及单一工作台（多个工作台 = Tier-1 或手动判断）
            const WORKSTATION_PREFIXES = [
              'backend/apps/secretary/', 'backend/apps/finance/', 'backend/apps/research/',
              'backend/apps/execution/', 'backend/apps/quality/', 'backend/apps/hr/',
              'backend/apps/crm/', 'backend/apps/resource/', 'backend/apps/scheduling/',
              'backend/apps/safety/', 'backend/apps/document/', 'backend/apps/ethics/',
              'backend/apps/sample/', 'backend/apps/lab_personnel/', 'backend/apps/feasibility/',
              'backend/apps/closeout/', 'backend/apps/ekuaibao_integration/',
              'backend/apps/lims_integration/', 'backend/apps/data_intake/',
              'workstations/secretary/', 'workstations/finance/', 'workstations/research/',
              'workstations/execution/', 'workstations/quality/', 'workstations/hr/',
              'workstations/crm/', 'workstations/recruitment/', 'workstations/equipment/',
              'workstations/material/', 'workstations/facility/', 'workstations/evaluator/',
              'workstations/lab-personnel/', 'workstations/ethics/', 'workstations/reception/',
              'workstations/control-plane/', 'workstations/admin/',
              'workstations/digital-workforce/', 'workstations/data-platform/',
            ];
            const touchedWorkstations = WORKSTATION_PREFIXES.filter(pfx =>
              changedFiles.some(f => f.startsWith(pfx))
            );
            const isTier2 = !isTier0 && !isTier1 && touchedWorkstations.length === 1;
            const isTier3 = !isTier0 && !isTier1 && !isTier2;

            // 确定最终等级标签
            const tierLabel = isTier0 ? 'tier-0' : (isTier1 ? 'tier-1' : (isTier2 ? 'tier-2' : 'tier-3'));
            const tierEmoji = isTier0 ? '🔴' : (isTier1 ? '🟠' : (isTier2 ? '🟡' : '🟢'));
            const tierDesc = isTier0
              ? '红线域（identity/libs/workflows）— 需要 CODEOWNERS 指定审批人批准'
              : (isTier1 ? '跨系统域' : (isTier2 ? `单工作台域（${touchedWorkstations[0]?.split('/')[2] || '?'}）` : '低风险'));

            core.info(`${tierEmoji} 风险等级：${tierLabel} — ${tierDesc}`);

            // 自动打 label（忽略失败，不阻断流程）
            try {
              // 确保 label 存在
              const labelConfigs = {
                'tier-0': { color: 'B60205', description: '红线域变更，需指定技术负责人审批' },
                'tier-1': { color: 'E4E669', description: '跨系统域变更' },
                'tier-2': { color: '0075CA', description: '单工作台域变更' },
                'tier-3': { color: '0E8A16', description: '低风险变更' },
              };
              for (const [name, cfg] of Object.entries(labelConfigs)) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    name, color: cfg.color, description: cfg.description,
                  });
                } catch (_) { /* label 已存在时忽略 */ }
              }
              // 移除旧的 tier label，添加新的
              const currentLabels = pr.labels.map(l => l.name);
              for (const old of currentLabels.filter(l => l.startsWith('tier-'))) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: pr.number, name: old,
                }).catch(() => {});
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, labels: [tierLabel],
              });
              core.info(`已为 PR 打标签：${tierLabel}`);
            } catch (e) {
              core.warning(`打标签失败（不阻断）：${e.message}`);
            }

            // 检查是否触及工作台注册表（需要额外确认）
            const touchesWorkstationRegistry = changedFiles.some((f) =>
              f === 'backend/configs/workstations.yaml' ||
              f === 'backend/apps/identity/api.py' ||
              f === 'backend/apps/identity/management/commands/seed_roles.py'
            );

            // 检查是否触及 Wave 1 红线文件（认证权限域）
            const touchesAuthScope = changedFiles.some((f) =>
              f.startsWith('backend/apps/identity/') ||
              f === 'backend/apps/secretary/models.py' ||
              f === 'backend/apps/secretary/feishu_fetcher.py'
            );

            // 检查是否触及知识资产域
            const touchesKnowledgeScope = changedFiles.some((f) =>
              f.startsWith('backend/apps/knowledge/') ||
              f.startsWith('backend/apps/ekuaibao_integration/models') ||
              f.startsWith('backend/apps/lims_integration/models')
            );

            // 检查迁移章程是否被直接修改（需要特殊审批）
            const touchesCharter = changedFiles.some((f) =>
              f === 'docs/V2_MIGRATION_CHARTER.md'
            );

            // 0. 分支命名规范校验
            const headBranch = context.payload.pull_request.head.ref;
            const VALID_TYPES = ["feature", "fix", "chore", "hotfix", "wave"];
            const VALID_WORKSTATIONS = [
              "secretary", "finance", "research", "execution", "quality",
              "hr", "crm", "recruitment", "equipment", "material", "facility",
              "evaluator", "lab-personnel", "ethics", "reception",
              "control-plane", "admin", "digital-workforce", "data-platform", "common"
            ];
            const EXEMPT_BRANCHES = ["main", "staging", "develop"];
            const branchPattern = /^(feature|fix|chore|hotfix|wave)\/([^/]+)\/(\d+)-.+$/;
            const branchMatch = headBranch.match(branchPattern);
            if (!EXEMPT_BRANCHES.includes(headBranch)) {
              if (!branchMatch) {
                failures.push(
                  `分支名 \`${headBranch}\` 不符合命名规范。\n` +
                  `正确格式：\`<type>/<workstation>/<issue-id>-<描述>\`\n` +
                  `示例：\`feature/execution/15-schedule-highlight\`、\`fix/finance/22-invoice-bug\`\n` +
                  `合法 type：${VALID_TYPES.join(" | ")}\n` +
                  `合法 workstation：${VALID_WORKSTATIONS.join(" | ")}`
                );
              } else {
                const [, , branchWorkstation] = branchMatch;
                if (!VALID_WORKSTATIONS.includes(branchWorkstation)) {
                  failures.push(
                    `分支中的工作台标识 \`${branchWorkstation}\` 不在合法列表中。\n` +
                    `合法 workstation：${VALID_WORKSTATIONS.join(" | ")}`
                  );
                }
              }
            }

            // 1. 必须关联 Issue
            const hasIssueLink =
              /Closes\s+#\d+/i.test(body) ||
              /Fixes\s+#\d+/i.test(body) ||
              /Resolves\s+#\d+/i.test(body) ||
              /#\d+/.test(body);
            if (!hasIssueLink) {
              failures.push("缺少 Issue 关联。请在 PR 中填写 `Closes #编号` 或至少包含 `#编号`。");
            }

            // 2. 必须勾选本地自测
            if (!/- \[x\]\s*已完成本地自测/i.test(body)) {
              failures.push("未勾选 `已完成本地自测`。");
            }

            // 3. 必须有测试步骤
            const hasConcreteTestSteps =
              /测试步骤与结果[\s\S]*1\.\s*\S+/m.test(body) ||
              /测试步骤与结果[\s\S]*-\s+\S+/m.test(body);
            if (!hasConcreteTestSteps) {
              failures.push("测试步骤与结果为空，请至少填写 1 条可复现的测试步骤。");
            }

            // 4. 必须有风险点与回滚方案
            const hasRiskDetail = /风险点[:：]\s*\S+/m.test(body);
            const hasRollbackDetail = /回滚方案[:：]\s*\S+/m.test(body);
            if (!hasRiskDetail || !hasRollbackDetail) {
              failures.push("请补充 `风险点` 与 `回滚方案` 的具体内容。");
            }

            // 5. 认证权限域的增强门禁
            if (touchesAuthScope) {
              if (!/- \[x\]\s*本 PR 不破坏飞书主授权链路/i.test(body)) {
                failures.push("本 PR 涉及认证/权限域，请勾选 `本 PR 不破坏飞书主授权链路`。");
              }
              if (!/- \[x\]\s*refresh_token 防覆盖逻辑已保留/i.test(body)) {
                failures.push("本 PR 涉及认证/权限域，请勾选 `refresh_token 防覆盖逻辑已保留`。");
              }
            }

            // 6. 知识资产域的增强门禁
            if (touchesKnowledgeScope) {
              if (!/- \[x\]\s*本 PR 不向生产知识资产执行无保护写操作/i.test(body)) {
                failures.push("本 PR 涉及知识资产域，请勾选 `本 PR 不向生产知识资产执行无保护写操作`。");
              }
            }

            // 7. 迁移章程变更需要特殊说明
            if (touchesCharter) {
              if (!/\[CHARTER\]/i.test(pr.title)) {
                failures.push("迁移章程变更须在 PR 标题前加 `[CHARTER]` 前缀，并需要系统负责人 Review。");
              }
            }

            // 8. 工作台注册表变更需要声明已运行一致性检查
            if (touchesWorkstationRegistry) {
              if (!/- \[x\]\s*已运行.*workstation_consistency_check/i.test(body) &&
                  !/workstation_consistency_check.*通过/i.test(body)) {
                failures.push(
                  "本 PR 涉及工作台注册表（workstations.yaml / identity/api.py / seed_roles.py），" +
                  "请在 PR 描述中勾选：`已运行 python3 ops/scripts/workstation_consistency_check.py 并通过`。"
                );
              }
            }

            // 9. Tier-0 红线域额外门禁
            if (isTier0) {
              if (!/- \[x\]\s*本 PR 已由指定技术负责人.*人工审核/i.test(body)) {
                failures.push(
                  "🔴 **Tier-0 红线域变更**：请在 PR 描述中勾选：\n" +
                  "`- [x] 本 PR 已由指定技术负责人（蒋艳雯/马蓓丽/孙华/宋小沫）人工审核`\n" +
                  "并确保 CODEOWNERS 列表中至少一人在 GitHub 上 Approve。"
                );
              }
            }

            if (failures.length > 0) {
              core.setFailed(
                `${tierEmoji} [${tierLabel.toUpperCase()}] PR 质量门禁未通过：\n` +
                  failures.map((f, i) => `${i + 1}. ${f}`).join("\n")
              );
            } else {
              core.info(`${tierEmoji} [${tierLabel.toUpperCase()}] PR quality gate passed ✅`);
              if (warnings.length > 0) {
                core.info("附加提示：\n" + warnings.map((w, i) => `${i + 1}. ${w}`).join("\n"));
              }
            }
