name: 文案/UI 修改
description: 修改按钮文字、提示语、样式等不影响逻辑的改动
title: "chore(<工作台>): <简要描述修改内容>"
labels: ["ui-copy"]
body:
  - type: dropdown
    id: workstation
    attributes:
      label: 工作台
      options:
        - 秘书台（secretary）
        - 财务台（finance）
        - 研究台（research）
        - 执行台（execution）
        - 质量台（quality）
        - 人事台（hr）
        - 客户台（crm）
        - 招募台（recruitment）
        - 设备台（equipment）
        - 物料台（material）
        - 设施台（facility）
        - 评估台（evaluator）
        - 人员台（lab-personnel）
        - 伦理台（ethics）
        - 接待台（reception）
        - 统管台（control-plane）
        - 治理台（governance）
        - 智能台（digital-workforce）
    validations:
      required: true

  - type: textarea
    id: change
    attributes:
      label: 修改内容
      description: 列出需要修改的每一处，说明当前内容和期望内容。
      placeholder: |
        1. 财务台发票申请页"确认"按钮 → 改为"提交审核"
        2. 质量台样品列表页空状态文案"暂无数据" → 改为"当前没有样品记录"
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: 位置（可选）
      description: 在哪个页面/组件？提供文件路径或截图
